name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: dtolnay/rust-toolchain@888c2e70ea4033993d62a0b35b4e1b0f569c8e53 # stable
      - uses: Swatinem/rust-cache@82a92a6e8b46e2e0e1a38a421a65ea3be8de4428 # v2.7.5
      - run: cargo check --locked --all-targets

  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: dtolnay/rust-toolchain@888c2e70ea4033993d62a0b35b4e1b0f569c8e53 # stable
      - uses: Swatinem/rust-cache@82a92a6e8b46e2e0e1a38a421a65ea3be8de4428 # v2.7.5
      - run: cargo test --locked --lib
      - run: cargo test --test api_integration
      - run: cargo test --test proptest_suite
      - run: cargo test --test full_suite
      - run: cargo test --test scale_bench
      - run: cargo test --test stress_test

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: dtolnay/rust-toolchain@888c2e70ea4033993d62a0b35b4e1b0f569c8e53 # stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@82a92a6e8b46e2e0e1a38a421a65ea3be8de4428 # v2.7.5
      - run: cargo fmt --all -- --check
      - run: cargo clippy --locked --all-targets -- -D warnings

  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: dtolnay/rust-toolchain@888c2e70ea4033993d62a0b35b4e1b0f569c8e53 # stable
      - uses: Swatinem/rust-cache@82a92a6e8b46e2e0e1a38a421a65ea3be8de4428 # v2.7.5
      - run: cargo install cargo-audit --locked
      - run: cargo audit

  msrv:
    name: MSRV Verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: dtolnay/rust-toolchain@888c2e70ea4033993d62a0b35b4e1b0f569c8e53 # 1.75.0
      - run: cargo check --lib

  bench:
    name: Benchmarks Compile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: dtolnay/rust-toolchain@888c2e70ea4033993d62a0b35b4e1b0f569c8e53 # stable
      - uses: Swatinem/rust-cache@82a92a6e8b46e2e0e1a38a421a65ea3be8de4428 # v2.7.5
      - run: cargo bench --bench benchmarks --no-run

  build:
    name: Build Release
    runs-on: ubuntu-latest
    needs: [check, test, lint]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: dtolnay/rust-toolchain@888c2e70ea4033993d62a0b35b4e1b0f569c8e53 # stable
      - uses: Swatinem/rust-cache@82a92a6e8b46e2e0e1a38a421a65ea3be8de4428 # v2.7.5
      - run: cargo build --locked --release
      - uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: tetramem-v12-linux-amd64
          path: target/release/tetramem-v12

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [check, test, lint]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: docker/build-push-action@48aba3b46d1c61c04792e3e0eef5e4e19e3e2a5d # v6.10.0
        with:
          context: .
          push: false
          tags: tetramem-v12:latest
