name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  build-linux:
    name: Build Linux x86_64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --locked --release
      - uses: actions/upload-artifact@v4
        with:
          name: tetramem-v12-linux-amd64
          path: target/release/tetramem-v12

  build-windows:
    name: Build Windows x86_64
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --locked --release
      - uses: actions/upload-artifact@v4
        with:
          name: tetramem-v12-windows-amd64
          path: target/release/tetramem-v12.exe

  build-macos:
    name: Build macOS x86_64
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --locked --release
      - uses: actions/upload-artifact@v4
        with:
          name: tetramem-v12-macos-amd64
          path: target/release/tetramem-v12

  release:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: [build-linux, build-windows, build-macos]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - run: |
          chmod +x artifacts/tetramem-v12-linux-amd64/tetramem-v12
          chmod +x artifacts/tetramem-v12-macos-amd64/tetramem-v12
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/tetramem-v12-linux-amd64/tetramem-v12
            artifacts/tetramem-v12-windows-amd64/tetramem-v12.exe
            artifacts/tetramem-v12-macos-amd64/tetramem-v12
          body: |
            TetraMem-XL v12.0.0 — 7D Dark Universe Memory System

            ## Binaries
            - **Linux x86_64**: `tetramem-v12`
            - **Windows x86_64**: `tetramem-v12.exe`
            - **macOS x86_64**: `tetramem-v12`

            ## Quick Start
            ```bash
            # Linux/macOS
            chmod +x tetramem-v12
            ./tetramem-v12

            # Windows
            .\tetramem-v12.exe
            ```

            Server starts at `http://localhost:3000` by default.
          draft: false
          prerelease: false
