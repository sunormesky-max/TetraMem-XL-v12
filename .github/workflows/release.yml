name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  packages: write

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-linux:
    name: Build Linux x86_64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --locked --release
      - uses: actions/upload-artifact@v4
        with:
          name: tetramem-v12-linux-amd64
          path: target/release/tetramem-v12

  build-windows:
    name: Build Windows x86_64
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --locked --release
      - uses: actions/upload-artifact@v4
        with:
          name: tetramem-v12-windows-amd64
          path: target/release/tetramem-v12.exe

  build-macos:
    name: Build macOS x86_64
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --locked --release
      - uses: actions/upload-artifact@v4
        with:
          name: tetramem-v12-macos-amd64
          path: target/release/tetramem-v12

  docker:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: [build-linux]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  release:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: [build-linux, build-windows, build-macos, docker]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - run: |
          chmod +x artifacts/tetramem-v12-linux-amd64/tetramem-v12
          chmod +x artifacts/tetramem-v12-macos-amd64/tetramem-v12
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/tetramem-v12-linux-amd64/tetramem-v12
            artifacts/tetramem-v12-windows-amd64/tetramem-v12.exe
            artifacts/tetramem-v12-macos-amd64/tetramem-v12
          body: |
            TetraMem-XL v12.0.0 — 7D Dark Universe Memory System

            ## Binaries
            - **Linux x86_64**: `tetramem-v12`
            - **Windows x86_64**: `tetramem-v12.exe`
            - **macOS x86_64**: `tetramem-v12`

            ## Docker
            ```bash
            docker pull ghcr.io/sunormesky-max/tetramem-xl-v12:latest
            docker run -p 3456:3456 ghcr.io/sunormesky-max/tetramem-xl-v12:latest
            ```

            ## Quick Start — REST Server
            ```bash
            # Generate config
            ./tetramem-v12 config

            # Start server (http://localhost:3456)
            ./tetramem-v12 serve -c config-agent.toml
            ```

            ## Quick Start — MCP Server (for AI Agents)
            ```bash
            # Run as MCP server (stdio JSON-RPC)
            ./tetramem-v12 mcp --energy 10000000.0
            ```

            ### Claude Desktop Integration
            Add to `claude_desktop_config.json`:
            ```json
            {
              "mcpServers": {
                "tetramem": {
                  "command": "tetramem-v12",
                  "args": ["mcp", "--energy", "10000000.0"]
                }
              }
            }
            ```

            ## 18 MCP Tools
            ### Core (13)
            `tetramem_stats` `tetramem_health` `tetramem_encode` `tetramem_decode` `tetramem_list_memories` `tetramem_pulse` `tetramem_dream` `tetramem_topology` `tetramem_regulate` `tetramem_trace` `tetramem_phase_detect` `tetramem_materialize` `tetramem_conservation_check`

            ### Agent-Facing (5)
            - `tetramem_remember` — Store memory with semantic auto-indexing + Hebbian linking
            - `tetramem_recall` — Semantic KNN + Hebbian neighbor retrieval
            - `tetramem_associate` — Association discovery via Hebbian walk + pulse propagation
            - `tetramem_consolidate` — Dream consolidation (strengthen important, weaken noise)
            - `tetramem_context` — Context window management with overflow auto-archive

            ## Preset Configs
            - `configs/config-agent.toml` — Agent mode (no auth, fast, SQLite)
            - `configs/config-server.toml` — Production server (auth, SQLite, rate limits)
            - `configs/config-full.toml` — Full features (high energy, debug logging)
          draft: false
          prerelease: false
