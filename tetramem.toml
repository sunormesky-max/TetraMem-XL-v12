[server]
addr = "0.0.0.0:3456"
timeout_secs = 30
body_limit_bytes = 10485760

[universe]
total_energy = 10000000.0
manifestation_threshold = 0.5

[auth]
enabled = false
jwt_secret = "change-me-in-production"
jwt_expiry_secs = 86400

[logging]
level = "info"
json_format = true

[backup]
dir = "./backups"
interval_secs = 300
max_generations = 10

[rate_limit]
requests_per_minute = 1000
burst = 50
