# TetraMem-XL v12.0 Configuration
# IMPORTANT: Change the default admin password hash before deploying!
# Default password: "changeme" (hash generated with argon2id)
# To generate a new hash, use: cargo test password_hashing_and_verify

[server]
addr = "127.0.0.1:3456"
timeout_secs = 30
body_limit_bytes = 10485760

[universe]
total_energy = 10000000.0
manifestation_threshold = 0.5

[auth]
enabled = true
raft_secret = "CHANGE-ME-TO-A-UNIQUE-RANDOM-SECRET"
jwt_expiry_secs = 86400

[[auth.users]]
username = "admin"
password_hash = "$argon2id$v=19$m=19456,t=2,p=1$l7+kFgPk+WRQHfRzEvZgGA$IrIHnE+KcLW7CRfv02DDMj/53fjTmUqsDVOHeibmAGs"
role = "admin"

[logging]
level = "info"
json_format = true

[backup]
dir = "./backups"
interval_secs = 300
max_generations = 10

[rate_limit]
requests_per_minute = 1000
burst = 50
