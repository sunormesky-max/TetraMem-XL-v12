[package]
name = "tetramem-v12"
version = "12.0.0"
edition = "2021"
description = "TetraMem-XL v12.0 - 7D Dark Universe Memory System"
license = "AGPL-3.0-or-later"
authors = ["sunormesky-max <sunormesky@gmail.com>"]
repository = "https://github.com/sunormesky-max/TetraMem-XL-v12"
rust-version = "1.75"
keywords = ["memory", "7d", "dark-universe", "energy-conservation", "tetrahedron"]
categories = ["data-structures", "science"]

[dependencies]
axum = "0.7"
tokio = { version = "1", features = ["full"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "json"] }
toml = "0.8"
thiserror = "2"
clap = { version = "4", features = ["derive"] }
tower-http = { version = "0.6", features = ["cors", "trace", "request-id", "propagate-header", "timeout", "limit", "metrics"] }
tower = { version = "0.5", features = ["full"] }
uuid = { version = "1", features = ["v4"] }
jsonwebtoken = "9"
chrono = "0.4"
prometheus = "0.13"
lazy_static = "1"
rusqlite = { version = "0.31", features = ["bundled"] }
openraft = { version = "0.10.0-alpha.18", features = ["serde"] }
async-trait = "0.1"
futures = "0.3"
reqwest = { version = "0.13.3", features = ["json"] }

[dev-dependencies]
criterion = "0.8.2"
http-body-util = "0.1"
proptest = "1.11.0"

[[bench]]
name = "benchmarks"
harness = false

[profile.dev]
incremental = false

[profile.test]
incremental = false

[[test]]
name = "full_suite"
path = "tests/full_suite.rs"
harness = false

[[test]]
name = "scale_bench"
path = "tests/scale_bench.rs"
harness = false

[[test]]
name = "stress_test"
path = "tests/stress_test.rs"
harness = false
